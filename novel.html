<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title> Novel</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eefaf0;
            margin: 0;
        }

        header {
            background: linear-gradient(90deg, #4a8c53e4, #f9d2ae);
            color: #0b2417;
            text-align: center;
            padding: 18px;
        }


        section h2 {
            color: #003366;
            margin-bottom: 15px;
        }

        .book-gallery {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .book-item {
            width: 200px;
            background-color: #e0f7fa;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .book-item img {
            width: 100%;
            height: 250px;
            border-radius: 8px;
            object-fit: cover;
        }

        .back-link {
            font-size: 18px;
            color: #003366;
            text-decoration: none;
            font-weight: bold;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        button {
            padding: 12px 28px;
            font-size: 18px;
            color: white;
            background: linear-gradient(to right, #9FBF7A, #5F7F39);

            border: none;
            border-radius: 30px;
            cursor: pointer;

        }

        button:hover {
            background: linear-gradient(135deg, #9FBF5A, #5F7F09);

        }
    </style>

</head>
