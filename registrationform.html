<!DOCTYPE html>
<html>
<head>
    <title>STUDENT REGISTRATION FORM</title>

    <style>
        body {
           
            font-family: Arial, sans-serif;
        }

        h1 {
           
            text-align: center;
            font-weight: bold;
        }

        .form-box {
            width: 600px;
            background-color: #4cf0f0;
            padding: 20px;
            margin: auto;
            border-radius: 10px;
        }

        table {
            width: 100%;
        }

        td {
            padding: 6px;
        }

        input, select, textarea {
            width: 95%;
            padding: 5px;
            border: 1px solid rgb(109, 221, 236);
            border-radius: 4px;
        }

        /* FIX radio & checkbox */
        input[type="radio"],
        input[type="checkbox"] {
            width: auto;
        }

        .small-input {
            width: 28%;
            display: inline-block;
        }

        .register-btn {
            width: 100px;
            padding: 8px;
            background-color: #64dbe8;
            border: none;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>STUDENT REGISTRATION FORM</h1>

<div class="form-box">
<form action="submit.php" method="post" 
      onsubmit="alert('Registration Successful!')">


<table>
<tr>
    <td>Roll no.:</td>
    <td><input type="text" name="roll"></td>
</tr>

<tr>
    <td>Student name:</td>
    <td>
        <input type="text" name="fname" class="small-input" required> -
        <input type="text" name="lname" class="small-input" required>
    </td>
</tr>

<tr>
    <td>Date of birth:</td>
    <td>
        <input type="text" name="day" class="small-input" required> -
        <input type="text" name="month" class="small-input" required> -
        <input type="text" name="year" class="small-input" required>
        (DD-MM-YYYY)
    </td>
</tr>

<tr>
    <td>Mobile no.:</td>
    <td>+91 <input type="text" name="mobile" style="width:85%;" required></td>
</tr>

<tr>
    <td>Email id:</td>
    <td><input type="email" name="email" required></td>
</tr>

<tr>
    <td>Password:</td>
    <td><input type="password" name="password" required></td>
</tr>

<tr>
    <td>Gender:</td>
    <td>
        <input type="radio" name="gender" value="Male" required> Male
        <input type="radio" name="gender" value="Female" required> Female
    </td>
</tr>

<tr>
    <td>Department:</td>
    <td>
        <input type="checkbox" name="dept[]" value="CSE"> CSE
        <input type="checkbox" name="dept[]" value="IT"> IT
        <input type="checkbox" name="dept[]" value="ECE"> ECE
        <input type="checkbox" name="dept[]" value="Civil"> Civil
        <input type="checkbox" name="dept[]" value="Mech"> Mech
    </td>
</tr>

<tr>
    <td>Course:</td>
    <td>
        <select name="course">
            <option>Select Current Course's</option>
            <option>BCA</option>
            <option>BBA</option>
            <option>BTech</option>
            <option>BSc</option>
            <option>BA</option>
        </select>
    </td>
</tr>

<tr>
    <td>Student photo:</td>
    <td><input type="file" name="photo"></td>
</tr>

<tr>
    <td>City:</td>
    <td><input type="text" name="city" required></td>
</tr>

<tr>
    <td>Address:</td>
    <td><textarea rows="3" name="address" required></textarea></td>
</tr>
</table>

<center>
    <button class="register-btn" type="submit">Register</button>
</center>

</form>
</div>

</body>
</html>
